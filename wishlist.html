<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Wishlist - Sabroso | Your Favorite Dishes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #ff6b35;
            --secondary: #f7c59f;
            --dark: #1a1a2e;
            --cream: #fefaf6;
            --gray: #6b7280;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #ffcc33 100%);
            --gradient-dark: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #ffcc33 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--cream);
            color: var(--dark);
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            height: 75px;
            background: rgba(254, 250, 246, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 107, 53, 0.1);
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary);
        }

        .nav-cta {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-outline {
            padding: 0.6rem 1.5rem;
            border: 2px solid var(--primary);
            border-radius: 50px;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            background: transparent;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary {
            padding: 0.65rem 1.6rem;
            background: var(--gradient);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        /* Hero */
        .wishlist-hero {
            padding: 110px 5% 40px;
            text-align: center;
            background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1920&q=80') center/cover no-repeat;
            position: relative;
            overflow: hidden;
        }

        .wishlist-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(26, 10, 0, 0.82) 0%, rgba(244, 131, 31, 0.4) 100%);
        }

        .wishlist-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            color: #fff;
            margin-bottom: 0.8rem;
            position: relative;
            z-index: 1;
        }

        .wishlist-hero h1 i {
            color: #ef4444;
            margin-right: 0.5rem;
        }

        .wishlist-hero p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }

        /* Main Content */
        .wishlist-main {
            padding: 2rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .wishlist-count {
            margin-bottom: 2rem;
            font-size: 1rem;
            color: var(--gray);
        }

        .wishlist-count span {
            font-weight: 800;
            color: var(--primary);
            font-size: 1.3rem;
        }

        /* Empty State */
        .empty-wishlist {
            text-align: center;
            padding: 5rem 2rem;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .empty-wishlist i {
            font-size: 5rem;
            color: #e5e7eb;
            margin-bottom: 1.5rem;
        }

        .empty-wishlist h2 {
            font-size: 1.8rem;
            color: var(--dark);
            margin-bottom: 0.8rem;
        }

        .empty-wishlist p {
            color: var(--gray);
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }

        .empty-wishlist .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            font-size: 1rem;
        }

        /* Wishlist Grid */
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .wish-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            transition: all 0.4s ease;
            position: relative;
        }

        .wish-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(255, 107, 53, 0.15);
        }

        .wish-card-img {
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .wish-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .wish-card:hover .wish-card-img img {
            transform: scale(1.1);
        }

        .wish-remove {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 50%;
            color: #ef4444;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .wish-remove:hover {
            background: #ef4444;
            color: #fff;
            transform: scale(1.1);
        }

        .wish-card-body {
            padding: 1.5rem;
        }

        .wish-card-country {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.3rem;
        }

        .wish-card-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .wish-card-desc {
            font-size: 0.88rem;
            color: var(--gray);
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .wish-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .wish-card-price {
            font-size: 1.4rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .wish-card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-add-cart {
            padding: 0.6rem 1.2rem;
            background: var(--gradient);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.3s;
        }

        .btn-add-cart:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .btn-add-cart.added {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
            background: var(--gradient);
            color: #fff;
            padding: 1rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.4);
            transform: translateY(150%);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        #toast.show {
            transform: translateY(0);
        }

        /* Hamburger */
        .hamburger {
            display: none;
            font-size: 1.5rem;
            color: var(--dark);
            cursor: pointer;
            padding: 0.5rem;
        }

        .mobile-cart-btn {
            display: none;
            position: relative;
            font-size: 1.2rem;
            color: var(--dark);
            text-decoration: none;
        }

        .mobile-cart-btn span {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--primary);
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: 700;
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 280px;
            height: 100vh;
            background: var(--white);
            z-index: 2000;
            padding: 2rem;
            transition: right 0.3s ease;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
        }

        .mobile-menu.show {
            right: 0;
        }

        .mobile-menu-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--dark);
        }

        .mobile-menu-links {
            list-style: none;
            margin-top: 3rem;
        }

        .mobile-menu-links li {
            margin-bottom: 1.5rem;
        }

        .mobile-menu-links a {
            text-decoration: none;
            color: var(--dark);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .mobile-menu-links a.active {
            color: var(--primary);
        }

        .mobile-menu-cta {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mobile-menu-cta a {
            text-align: center;
        }

        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
        }

        .mobile-overlay.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links, .nav-cta { display: none; }
            .hamburger, .mobile-cart-btn { display: block; }

            nav {
                padding: 0 4%;
            }

            .wishlist-grid {
                grid-template-columns: 1fr;
            }

            .wishlist-hero {
                padding: 100px 4% 40px;
            }

            .wishlist-hero h1 {
                font-size: 1.8rem;
            }

            .wishlist-hero p {
                font-size: 0.95rem;
            }

            .wishlist-main {
                padding: 1.5rem 4%;
            }

            .wish-card-body {
                padding: 1rem;
            }

            .wish-card-name {
                font-size: 1.1rem;
            }

            .wish-card-price {
                font-size: 1.2rem;
            }

            #toast {
                bottom: 1.5rem;
                right: 1.5rem;
                left: 1.5rem;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .wishlist-hero {
                padding: 90px 4% 30px;
            }

            .wishlist-hero h1 {
                font-size: 1.5rem;
            }

            .wish-card-img {
                height: 160px;
            }

            .btn-add-cart {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="nav-logo">Sabroso</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="wishlist.html" class="active">Wishlist</a></li>
            <li><a href="index.html#reviews">Reviews</a></li>
        </ul>
        <div class="nav-cta">
            <a href="login.html" class="btn-outline">Login</a>
            <a href="cart.html" class="btn-primary"><i class="fas fa-shopping-cart"></i> Cart (<span id="cartCount">0</span>)</a>
        </div>
        <a href="cart.html" class="mobile-cart-btn"><i class="fas fa-shopping-cart"></i><span class="mCartCount">0</span></a>
        <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-close" id="mobileMenuClose"><i class="fas fa-times"></i></div>
        <ul class="mobile-menu-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="wishlist.html" class="active">Wishlist</a></li>
            <li><a href="index.html#reviews">Reviews</a></li>
        </ul>
        <div class="mobile-menu-cta">
            <a href="login.html" class="btn-outline">Login</a>
            <a href="cart.html" class="btn-primary"><i class="fas fa-shopping-cart"></i> Cart</a>
        </div>
    </div>

    <section class="wishlist-hero">
        <h1>My Wishlist</h1>
        <p>Your favorite dishes saved for later</p>
    </section>

    <main class="wishlist-main">
        <p class="wishlist-count"><span id="wishCount">0</span> items in your wishlist</p>

        <div id="wishlistContent">
            <!-- Will be populated by JS -->
        </div>
    </main>

    <div id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Done!</span></div>

    <script src="api-config.js"></script>
    <script>
        let allDishes = [];

        async function init() {
            updateCartCount();
            await fetchDishes();
            renderWishlist();
        }

        function updateCartCount() {
            try {
                const cart = JSON.parse(localStorage.getItem('sabroso_cart') || '[]');
                document.getElementById('cartCount').textContent = cart.length;
                document.querySelectorAll('.mCartCount').forEach(el => el.textContent = cart.length);
            } catch(e) {
                document.getElementById('cartCount').textContent = '0';
                document.querySelectorAll('.mCartCount').forEach(el => el.textContent = '0');
            }
        }

        async function fetchDishes() {
            try {
                const response = await apiFetch('/dishes');
                allDishes = response.dishes || [];
            } catch (error) {
                console.error('Failed to fetch dishes:', error);
            }
        }

        function renderWishlist() {
            const favIds = JSON.parse(localStorage.getItem('sabroso_favs') || '[]');
            const favDishes = allDishes.filter(d => favIds.includes(d._id));
            const container = document.getElementById('wishlistContent');

            document.getElementById('wishCount').textContent = favDishes.length;

            if (favDishes.length === 0) {
                container.innerHTML = `
                    <div class="empty-wishlist">
                        <i class="far fa-heart"></i>
                        <h2>Your wishlist is empty</h2>
                        <p>Start adding your favorite dishes by clicking the heart icon on any dish!</p>
                        <a href="menu.html" class="btn-primary"><i class="fas fa-utensils"></i> Explore Menu</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="wishlist-grid">
                    ${favDishes.map(d => `
                        <div class="wish-card" id="wish-${d._id}">
                            <div class="wish-card-img">
                                <img src="${d.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500'}" alt="${d.name}" />
                                <button class="wish-remove" onclick="removeFromWishlist('${d._id}', '${d.name}')" title="Remove from wishlist">
                                    <i class="fas fa-heart-broken"></i>
                                </button>
                            </div>
                            <div class="wish-card-body">
                                <div class="wish-card-country">${d.country || d.cuisine}</div>
                                <div class="wish-card-name">${d.name}</div>
                                <div class="wish-card-desc">${d.description}</div>
                                <div class="wish-card-footer">
                                    <div class="wish-card-price">₹${d.price.toFixed(0)}</div>
                                    <div class="wish-card-actions">
                                        <button class="btn-add-cart" onclick="addToCart(this, '${d._id}', '${d.name}')">
                                            <i class="fas fa-cart-plus"></i> Add
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function removeFromWishlist(id, name) {
            let favs = JSON.parse(localStorage.getItem('sabroso_favs') || '[]');
            favs = favs.filter(f => f !== id);
            localStorage.setItem('sabroso_favs', JSON.stringify(favs));

            const card = document.getElementById(`wish-${id}`);
            if (card) {
                card.style.transform = 'scale(0.8)';
                card.style.opacity = '0';
                setTimeout(() => renderWishlist(), 300);
            }

            showToast(`💔 ${name} removed from wishlist`);
        }

        function addToCart(btn, id, name) {
            const dish = allDishes.find(d => d._id === id);
            if (!dish) return;

            const cart = JSON.parse(localStorage.getItem('sabroso_cart') || '[]');
            cart.push({ ...dish, quantity: 1 });
            localStorage.setItem('sabroso_cart', JSON.stringify(cart));

            btn.classList.add('added');
            btn.innerHTML = '<i class="fas fa-check"></i> Added!';
            updateCartCount();
            showToast(`🛒 ${name} added to cart!`);

            setTimeout(() => {
                btn.classList.remove('added');
                btn.innerHTML = '<i class="fas fa-cart-plus"></i> Add';
            }, 2500);
        }

        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        init();

        // Mobile Menu Toggle
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');
        const mobileOverlay = document.getElementById('mobileOverlay');
        const mobileMenuClose = document.getElementById('mobileMenuClose');

        function openMobileMenu() {
            mobileMenu.classList.add('show');
            mobileOverlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeMobileMenu() {
            mobileMenu.classList.remove('show');
            mobileOverlay.classList.remove('show');
            document.body.style.overflow = '';
        }

        hamburger.addEventListener('click', openMobileMenu);
        mobileMenuClose.addEventListener('click', closeMobileMenu);
        mobileOverlay.addEventListener('click', closeMobileMenu);
    </script>
</body>
</html>
